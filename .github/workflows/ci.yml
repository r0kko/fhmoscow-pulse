name: CI

on:
  push:
    branches:
      - main
      - test
  pull_request:
    branches:
      - main
      - test
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-static:
    name: Quality Static Checks
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      - name: Use Node.js 24.12.0
        uses: actions/setup-node@v4
        with:
          node-version: 24.12.0
          cache: npm
          cache-dependency-path: |
            package-lock.json
            client/package-lock.json

      - name: Print versions
        run: |
          node -v
          npm -v

      - name: Install API dependencies
        run: npm ci

      - name: Install client dependencies
        working-directory: client
        run: npm ci

      - name: Clear Jest cache
        run: npx jest --clearCache || true

      - name: Audit runtime dependencies (blocking)
        run: npm run audit:prod

      - name: Audit all dependencies (informational)
        continue-on-error: true
        run: npm run audit:full

      - name: Validate Grafana dashboards
        run: npm run validate:dashboards

      - name: Lint checks
        run: npm run lint:ci

      - name: Format checks
        run: npm run format:check

  test-server-coverage:
    name: Server Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - name: Use Node.js 24.12.0
        uses: actions/setup-node@v4
        with:
          node-version: 24.12.0
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install API dependencies
        run: npm ci

      - name: Clear Jest cache
        run: npx jest --clearCache || true

      - name: Run server coverage
        env:
          CI: true
        run: npm run test:server:coverage

      - name: Upload server coverage artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: server-coverage-${{ github.sha }}
          path: |
            coverage
          if-no-files-found: ignore
          retention-days: 7

  test-client-coverage:
    name: Client Coverage
    if: false # TEMP: disabled due long-running/stuck coverage stage in CI
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6

      - name: Use Node.js 24.12.0
        uses: actions/setup-node@v4
        with:
          node-version: 24.12.0
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install client dependencies
        working-directory: client
        run: npm ci

      - name: Run client coverage
        env:
          CI: true
        run: timeout 15m npm --prefix client run test:coverage

      - name: Debug stuck client coverage process tree
        if: failure()
        run: |
          ps -eo pid,ppid,stat,etime,cmd | grep -E 'node|npm|vitest' | grep -v grep || true

      - name: Upload client coverage artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: client-coverage-${{ github.sha }}
          path: |
            coverage/client
          if-no-files-found: ignore
          retention-days: 7

  quality:
    name: Quality Gate
    runs-on: ubuntu-latest
    if: always()
    needs:
      - quality-static
      - test-server-coverage
    steps:
      - name: Ensure all quality jobs passed
        run: |
          echo "quality-static: ${{ needs.quality-static.result }}"
          echo "test-server-coverage: ${{ needs.test-server-coverage.result }}"
          if [[ "${{ needs.quality-static.result }}" != "success" || "${{ needs.test-server-coverage.result }}" != "success" ]]; then
            echo "One or more quality jobs failed"
            exit 1
          fi

  client-build:
    name: Build Client Artifact
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v6

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.12.0
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install client dependencies
        working-directory: client
        run: npm ci

      - name: Build client (Vite)
        working-directory: client
        run: npm run build

      - name: Upload client bundle
        uses: actions/upload-artifact@v6
        with:
          name: client-dist-${{ github.sha }}
          path: client/dist
          if-no-files-found: error
          retention-days: 7

  docker-release:
    name: Publish Docker Images
    runs-on: ubuntu-latest
    needs:
      - quality
      - client-build
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/heads/')
    environment: ${{ contains(fromJson('["test","test-2"]'), github.ref_name) && github.ref_name || 'production' }}
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push server image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.sha }}

      - name: Build and push client image
        uses: docker/build-push-action@v5
        with:
          context: ./client
          file: ./client/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}-client:latest
            ghcr.io/${{ github.repository }}-client:${{ github.sha }}
