name: Security Audit

on:
  schedule:
    - cron: '30 1 * * 1'
  workflow_dispatch:
  push:
    branches:
      - main
      - test
    paths:
      - 'Dockerfile'
      - 'client/Dockerfile'
      - 'package.json'
      - 'package-lock.json'
      - 'client/package.json'
      - 'client/package-lock.json'
      - '.github/workflows/security-audit.yml'

permissions:
  contents: read
  security-events: write

concurrency:
  group: security-audit-${{ github.ref }}
  cancel-in-progress: true

jobs:
  npm-audit:
    name: NPM Audit
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - name: Use Node.js 24.12.0
        uses: actions/setup-node@v4
        with:
          node-version: 24.12.0
          cache: npm
          cache-dependency-path: |
            package-lock.json
            client/package-lock.json

      - name: Install API dependencies
        run: npm ci

      - name: Install client dependencies
        working-directory: client
        run: npm ci

      - name: Audit runtime and client dependencies
        run: npm run audit:full

  docker-scout:
    name: Docker Image Scan
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build server image locally
        uses: docker/build-push-action@v7
        with:
          context: .
          load: true
          tags: fhmoscow-pulse-api:${{ github.sha }}

      - name: Build client image locally
        uses: docker/build-push-action@v7
        with:
          context: ./client
          file: ./client/Dockerfile
          load: true
          tags: fhmoscow-pulse-client:${{ github.sha }}

      - name: Scan server image for critical and high CVEs
        id: scout-server
        uses: docker/scout-action@v1.20.4
        with:
          command: cves
          image: local://fhmoscow-pulse-api:${{ github.sha }}
          only-severities: critical,high
          exit-code: true
          sarif-file: docker-scout-server.sarif
          write-comment: false

      - name: Scan client image for critical and high CVEs
        id: scout-client
        uses: docker/scout-action@v1.20.4
        with:
          command: cves
          image: local://fhmoscow-pulse-client:${{ github.sha }}
          only-severities: critical,high
          exit-code: true
          sarif-file: docker-scout-client.sarif
          write-comment: false

      - name: Upload server Docker SARIF
        if: always() && hashFiles('docker-scout-server.sarif') != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: docker-scout-server.sarif
          category: docker-scout-server

      - name: Upload client Docker SARIF
        if: always() && hashFiles('docker-scout-client.sarif') != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: docker-scout-client.sarif
          category: docker-scout-client
