name: Security Audit

on:
  schedule:
    - cron: '30 1 * * 1'
  workflow_dispatch:
  push:
    branches:
      - main
      - test
    paths:
      - 'Dockerfile'
      - 'client/Dockerfile'
      - 'package.json'
      - 'package-lock.json'
      - 'client/package.json'
      - 'client/package-lock.json'
      - '.github/workflows/security-audit.yml'

permissions:
  contents: read
  security-events: write

concurrency:
  group: security-audit-${{ github.ref }}
  cancel-in-progress: true

jobs:
  npm-audit:
    name: NPM Audit
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - name: Use Node.js 24.12.0
        uses: actions/setup-node@v4
        with:
          node-version: 24.12.0
          cache: npm
          cache-dependency-path: |
            package-lock.json
            client/package-lock.json

      - name: Install API dependencies
        run: npm ci

      - name: Install client dependencies
        working-directory: client
        run: npm ci

      - name: Audit runtime and client dependencies
        run: npm run audit:full

  docker-image-scan:
    name: Docker Image Scan
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build server image locally
        uses: docker/build-push-action@v7
        with:
          context: .
          load: true
          tags: fhmoscow-pulse-api:${{ github.sha }}

      - name: Build client image locally
        uses: docker/build-push-action@v7
        with:
          context: ./client
          file: ./client/Dockerfile
          load: true
          tags: fhmoscow-pulse-client:${{ github.sha }}

      - name: Scan server image for critical and high CVEs
        id: trivy-server
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: fhmoscow-pulse-api:${{ github.sha }}
          format: sarif
          output: trivy-server.sarif
          severity: CRITICAL,HIGH
          vuln-type: os,library
          limit-severities-for-sarif: true
          exit-code: '1'

      - name: Scan client image for critical and high CVEs
        id: trivy-client
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: fhmoscow-pulse-client:${{ github.sha }}
          format: sarif
          output: trivy-client.sarif
          severity: CRITICAL,HIGH
          vuln-type: os,library
          limit-severities-for-sarif: true
          exit-code: '1'

      - name: Upload server image SARIF
        if: always() && hashFiles('trivy-server.sarif') != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-server.sarif
          category: trivy-server-image

      - name: Upload client image SARIF
        if: always() && hashFiles('trivy-client.sarif') != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-client.sarif
          category: trivy-client-image
